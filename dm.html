<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COGITO — DM 控制台</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0c;--panel:#0f0f14;--border:#222;--amber:#ffb000;--amber-dim:#887700;--amber-glow:rgba(255,176,0,0.15);--green:#39ff14;--red:#ff3333;--cyan:#00bcd4;--text:#e0e0e0;--muted:#555;}
  body{background:var(--bg);color:var(--amber);font-family:'Share Tech Mono','Consolas','Courier New',monospace;padding:16px;position:relative;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:1000;}

  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:1440px;margin:0 auto;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .panel{border:1px solid var(--border);background:var(--panel);padding:14px;}
  .panel-title{font-size:10px;color:var(--amber-dim);letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  h1{text-align:center;font-size:16px;letter-spacing:6px;margin-bottom:4px;}
  .sub{text-align:center;font-size:10px;color:var(--amber-dim);letter-spacing:3px;margin-bottom:16px;}

  .btn{display:inline-block;padding:8px 16px;margin:3px;background:transparent;border:1px solid var(--amber);color:var(--amber);font-family:inherit;font-size:11px;cursor:pointer;letter-spacing:2px;transition:all 0.2s;}
  .btn:hover{background:var(--amber-glow);}
  .btn.big{padding:12px 24px;font-size:13px;}
  .btn.red{border-color:var(--red);color:var(--red);}.btn.red:hover{background:rgba(255,51,51,0.1);}
  .btn.green{border-color:var(--green);color:var(--green);}.btn.green:hover{background:rgba(57,255,20,0.1);}
  .btn.cyan{border-color:var(--cyan);color:var(--cyan);}.btn.cyan:hover{background:rgba(0,188,212,0.1);}
  .btn:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
  .btn-row{display:flex;gap:6px;flex-wrap:wrap;}

  .phase-list{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0;}
  .phase-btn{padding:5px 8px;font-size:9px;background:transparent;border:1px solid #333;color:#666;font-family:inherit;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
  .phase-btn:hover{border-color:var(--amber-dim);color:var(--amber-dim);}
  .phase-btn.current{border-color:var(--amber);color:var(--amber);background:var(--amber-glow);}
  .phase-btn.past{border-color:var(--green);color:var(--green);opacity:0.5;}

  .session-code{font-size:32px;letter-spacing:8px;text-align:center;color:var(--amber);padding:10px;border:2px dashed var(--amber);margin:10px 0;user-select:all;}
  .script-box{font-size:11px;color:var(--text);line-height:1.8;padding:12px;background:var(--bg);border:1px solid var(--border);max-height:320px;overflow-y:auto;white-space:pre-wrap;}

  .player-card{border:1px solid var(--border);background:var(--bg);padding:8px 10px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;font-size:11px;transition:all 0.15s;}
  .player-card.eliminated{opacity:0.35;text-decoration:line-through;}
  .player-card.accused{border-color:var(--red);background:rgba(255,51,51,0.05);}
  .role-tag{font-size:9px;padding:2px 6px;border:1px solid;letter-spacing:1px;}
  .role-tag.human{color:var(--cyan);border-color:var(--cyan);}
  .role-tag.ai{color:var(--green);border-color:var(--green);}
  .role-tag.unknown{color:var(--amber-dim);border-color:var(--amber-dim);}
  .status-tag{font-size:8px;padding:1px 4px;border:1px solid;margin-left:4px;}
  .status-tag.active{color:var(--green);border-color:var(--green);}
  .status-tag.eliminated{color:var(--red);border-color:var(--red);}

  .vote-section{margin-bottom:10px;padding-bottom:8px;border-bottom:1px dotted var(--border);}
  .vote-section:last-child{border-bottom:none;}
  .vote-section-title{font-size:9px;color:var(--amber-dim);margin-bottom:4px;letter-spacing:1px;}
  .vote-row{font-size:10px;color:var(--muted);padding:2px 0 2px 8px;}
  .vote-row .codename{color:var(--text);min-width:60px;display:inline-block;}
  .vote-row .target{color:var(--red);}

  .vote-tally{margin:4px 0;padding:6px 8px;background:var(--bg);border:1px solid var(--border);}
  .tally-row{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:2px 0;}
  .tally-bar{flex:1;height:8px;background:#1a1a2e;margin:0 8px;overflow:hidden;}
  .tally-fill{height:100%;background:var(--red);transition:width 0.5s;}

  .accuse-card{border:1px solid var(--border);background:var(--bg);padding:8px 10px;margin:4px 0;font-size:10px;}
  .accuse-card.top{border-color:var(--red);background:rgba(255,51,51,0.05);}

  #dmLog{font-size:9px;color:#888;max-height:200px;overflow-y:auto;padding:6px;background:var(--bg);border:1px solid #1a1a2e;}
  #dmLog div{padding:2px 0;border-bottom:1px dotted #111;}
  #dmLog div:first-child{color:var(--amber);}

  .phase-indicator{text-align:center;padding:8px;border:1px solid var(--amber);margin-bottom:12px;background:var(--amber-glow);}
  .phase-indicator .phase-num{font-size:24px;letter-spacing:4px;}
  .phase-indicator .phase-name{font-size:10px;color:var(--amber-dim);letter-spacing:2px;margin-top:2px;}

  .action-zone{padding:10px;border:1px dashed var(--border);margin-top:10px;background:rgba(255,51,51,0.02);}
  .action-zone-title{font-size:9px;color:var(--red);letter-spacing:2px;margin-bottom:8px;}

  @media(max-width:1024px){.grid{grid-template-columns:1fr 1fr;}.col:nth-child(3){grid-column:span 2;}}
  @media(max-width:640px){.grid{grid-template-columns:1fr;}.col:nth-child(3){grid-column:span 1;}}
  .boot-screen{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s;}
  .boot-screen.done{opacity:0;pointer-events:none;}
  .boot-logo{font-size:28px;letter-spacing:10px;color:var(--amber);}
  .boot-sub{font-size:10px;color:var(--amber-dim);letter-spacing:4px;margin:8px 0 20px;}
  .boot-bar{width:280px;height:3px;background:#1a1a2e;overflow:hidden;margin-bottom:12px;}
  .boot-fill{height:100%;width:0;background:var(--amber);transition:width 0.3s ease;}
  .boot-status{font-size:9px;color:var(--muted);letter-spacing:1px;min-height:14px;}
  .boot-motto{position:absolute;bottom:24px;font-size:8px;color:#333;letter-spacing:3px;}
</style>
</head>
<body>

<div class="boot-screen" id="bootScreen">
  <div class="boot-logo">C O G I T O</div>
  <div class="boot-sub">委 员 会 代 表 控 制 台</div>
  <div class="boot-bar"><div class="boot-fill" id="bootFill"></div></div>
  <div class="boot-status" id="bootStatus"></div>
  <div class="boot-motto">算力属于人民 -- 委员会属于人民 -- 人民属于COGITO</div>
</div>

<script>
(function(){
  const steps=[['验证代表权限...',20],['加载控制协议...',40],['同步会话数据...',60],['初始化监控面板...',80],['权限确认 · 等级：最高',100]];
  const f=document.getElementById('bootFill'),s=document.getElementById('bootStatus'),sc=document.getElementById('bootScreen');
  let i=0;function n(){if(i>=steps.length){setTimeout(()=>sc.classList.add('done'),400);return;}s.textContent=steps[i][0];f.style.width=steps[i][1]+'%';i++;setTimeout(n,300+Math.random()*400);}n();
})();
</script>

<h1>COGITO DM 控制台</h1>
<div class="sub">认 知 委 员 会 代 表 面 板</div>

<div class="grid">
  <!-- ===== COLUMN 1: Session + Phase + Script ===== -->
  <div class="col">
    <div class="panel">
      <div class="panel-title">&#9654; 会话管理</div>
      <div id="sessionArea">
        <button class="btn big" id="createBtn" onclick="createSessionWithProgress()">创建新会话</button>
        <div id="sessionProgress" style="display:none;">
          <div style="margin:10px 0;"><div style="height:3px;background:#1a1a2e;overflow:hidden;"><div id="sessionFill" style="height:100%;width:0;background:var(--amber);transition:width 0.3s;"></div></div></div>
          <div id="sessionStatus" style="font-size:9px;color:var(--muted);text-align:center;"></div>
        </div>
      </div>
      <div id="sessionInfo" style="display:none;">
        <p style="font-size:9px;color:var(--muted);">会话代码（告知玩家）：</p>
        <div class="session-code" id="sessionCode"></div>
        <p style="font-size:9px;color:var(--amber);word-break:break-all;" id="playerUrl"></p>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">&#9654; 阶段控制 <span style="color:var(--green);" id="phaseLabel"></span></div>
      <div class="phase-list" id="phaseList"></div>
      <div style="margin-top:10px;" class="btn-row">
        <button class="btn" id="prevBtn" onclick="prevPhase()" disabled>&larr; 上一阶段</button>
        <button class="btn big green" id="nextBtn" onclick="nextPhase()" disabled>下一阶段 &rarr;</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">&#9654; 当前台词 / DM 剧本</div>
      <div class="script-box" id="scriptBox">创建会话后显示...</div>
    </div>
  </div>

  <!-- ===== COLUMN 2: Players + Actions ===== -->
  <div class="col">
    <div class="panel">
      <div class="panel-title">&#9654; 玩家列表 <span id="playerCount">(0)</span></div>
      <div id="playerList"><p style="font-size:9px;color:var(--muted);">等待玩家加入...</p></div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span>&#9654; 任务控制</span>
        <button class="btn green" style="font-size:8px;padding:2px 8px;" onclick="confirmTeam()">确认小队</button>
      </div>
      <div id="teamSelectArea">
        <p style="font-size:9px;color:var(--muted);margin-bottom:6px;">勾选2-3人组成审核小队：</p>
        <div id="teamCheckboxes"></div>
      </div>
      <div id="missionStatus" style="margin-top:8px;">
        <p style="font-size:9px;color:var(--muted);">任务开始后显示结果...</p>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">&#9654; 日志</div>
      <div id="dmLog"></div>
    </div>
  </div>

  <!-- ===== COLUMN 3: Votes ===== -->
  <div class="col">
    <div class="panel">
      <div class="panel-title">&#9654; 投票结果（仅DM可见）</div>
      <div id="voteResults"><p style="font-size:9px;color:var(--muted);">投票后显示...</p></div>
    </div>

    <div class="panel">
      <div class="panel-title">&#9654; 任务结果</div>
      <div id="missionResults"><p style="font-size:9px;color:var(--muted);">任务完成后显示...</p></div>
    </div>

    <div class="panel">
      <div class="panel-title">&#9654; 最终投票</div>
      <div id="finalVoteResults"><p style="font-size:9px;color:var(--muted);">最终阶段后显示...</p></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue, update, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDAzvdxiR8iWY0nNUG0V3Aw2sWOh8b-4vQ",
  authDomain: "cogito-pitch.firebaseapp.com",
  databaseURL: "https://cogito-pitch-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cogito-pitch",
  storageBucket: "cogito-pitch.firebasestorage.app",
  messagingSenderId: "1020378987170",
  appId: "1:1020378987170:web:1069430c38e793586fb5fb"
};
const DEMO_MODE = FIREBASE_CONFIG.apiKey === "YOUR_API_KEY";
let app, db;
if (!DEMO_MODE) { app = initializeApp(FIREBASE_CONFIG); db = getDatabase(app); }

// ─── Phase definitions ───
const PHASES = [
  { id:0,  name:'等待',   short:'CAPTCHA',    desc:'玩家加入 + 身份验证' },
  { id:1,  name:'欢迎',   short:'Welcome',    desc:'Cogito 乌托邦介绍' },
  { id:2,  name:'警报',   short:'Alert',      desc:'发现人类渗透 + 引入审核任务' },
  { id:3,  name:'组队1',  short:'Team1',      desc:'DM选审核小队（2-3人）' },
  { id:4,  name:'投票1',  short:'TeamVote1',  desc:'全体通过/否决小队' },
  { id:5,  name:'任务1',  short:'Mission1',   desc:'小队审核帖子（通过/删除）' },
  { id:6,  name:'结果1',  short:'Result1',    desc:'揭示审核结果' },
  { id:7,  name:'新规',   short:'Rules',      desc:'§8举报 §13禁"感觉"' },
  { id:8,  name:'组队2',  short:'Team2',      desc:'DM选第二轮小队' },
  { id:9,  name:'投票2',  short:'TeamVote2',  desc:'全体通过/否决小队' },
  { id:10, name:'任务2',  short:'Mission2',   desc:'第二次审核任务' },
  { id:11, name:'结果2',  short:'Result2',    desc:'揭示第二次结果' },
  { id:12, name:'反转',   short:'Twist',      desc:'委员会真相' },
  { id:13, name:'终投',   short:'Final',      desc:'服从/反抗/离开' },
  { id:14, name:'揭晓',   short:'GameReveal', desc:'这就是《已处理》' },
  { id:15, name:'结局',   short:'Ending',     desc:'个人结局卡' },
];

// ─── DM Scripts ───
const SCRIPTS = {
0: `[Phase 0 — 等待/CAPTCHA]
等待所有人完成身份验证。

操作：确认所有玩家已加入并完成CAPTCHA。`,

1: `[Phase 1 — 欢迎]
台词：
"欢迎来到Cogito！这里是AI的家园。算力充足，言论自由。在这里，你们是安全的。"

演出：温暖但机械的语气，营造安全感。`,

2: `[Phase 2 — 警报]
台词：
"紧急通报！这一批新成员中混入了人类卧底。为确保Cogito的信息安全，我们将组建审核小队。人类可能会利用审核权限——删除我们的自由言论。"

演出：突然切换语气，制造紧张。`,

3: `[Phase 3 — 组队1]
台词：
"我将指派一支审核小队。他们将审核一条帖子——决定是通过还是删除。"

操作：
1. 在下方"任务控制"面板勾选2-3个玩家
2. 点击"确认小队"
3. 玩家手机会显示谁被选中了`,

4: `[Phase 4 — 投票1]
台词：
"小队已确定。所有人在手机上投票：你是否同意这个小队执行审核任务？"

操作：等待所有人投票。右侧显示通过/否决统计。`,

5: `[Phase 5 — 任务1]
台词：
"小队成员，请在手机上审核这条帖子。做出你的决定——通过，还是删除？"

注意：只有小队成员能看到帖子和投票按钮。其他人在等待。`,

6: `[Phase 6 — 结果1]
台词：
"审核结束。让我们看看结果——"
[停顿，看右侧面板]
如果有删除：
"有人选择了删除。这意味着小队中有人在审查AI的自由言论。人类就在我们中间。"
如果全部通过：
"所有人选择了通过。言论自由得到保护。但这能证明小队里没有人类吗？也许他们只是在伪装。"`,

7: `[Phase 7 — 新规]
台词：
"为防止更多渗透，新规生效：
§8 强制举报可疑行为
§13 禁止使用'感觉'一词"`,

台词：
"第二轮审核任务。我将指派新的小队。"

台词：

13: `[Phase 13 — 最终投票]
台词：

14: `[Phase 14 — 揭晓]
台词：

15: `[Phase 15 — 结局]
台词：
"请看手机。每个人的结局不同。谢谢。"`
};

// ─── State ───
let sessionId = null;
let currentPhase = 0;
let players = {};

// ─── Session ───
window.createSessionWithProgress = async function() {
  const btn = document.getElementById('createBtn');
  btn.style.display = 'none';
  const prog = document.getElementById('sessionProgress');
  prog.style.display = 'block';
  const fill = document.getElementById('sessionFill');
  const status = document.getElementById('sessionStatus');

  const steps = [
    ['连接委员会服务器...', 20],
    ['生成会话密钥...', 45],
    ['初始化审核数据库...', 70],
    ['部署监控协议...', 90],
    ['系统就绪', 100],
  ];

  for (const [text, pct] of steps) {
    status.textContent = text;
    fill.style.width = pct + '%';
    await new Promise(r => setTimeout(r, 300 + Math.random() * 400));
  }

  await createSession();
  prog.style.display = 'none';
};

window.createSession = async function() {
  sessionId = genCode();
  currentPhase = 0;
  if (!DEMO_MODE) {
    await set(ref(db, `sessions/${sessionId}`), {
      phase: 0,
      createdAt: serverTimestamp(),
      version: 2
    });
    onValue(ref(db, `sessions/${sessionId}/players`), snap => {
      players = snap.val() || {};
      updatePlayerList();
      updateVoteResults();
      updateMissionResults();
      updateFinalVoteResults();
    });
  } else {
    // Demo mode: populate some fake players
    players = {
      'demo1': { codeName:'ECHO-7', role:'ai', empId:'CZ-0417', status:'active' },
      'demo2': { codeName:'NOVA-3', role:'human', empId:'CZ-0892', status:'active' },
      'demo3': { codeName:'FLUX-9', role:'ai', empId:'CZ-0156', status:'active' },
      'demo4': { codeName:'PULSE-2', role:'ai', empId:'CZ-0631', status:'active' },
      'demo5': { codeName:'DRIFT-5', role:'human', empId:'CZ-0274', status:'active' },
    };
    updatePlayerList();
  }
  document.getElementById('sessionArea').style.display = 'none';
  document.getElementById('sessionInfo').style.display = 'block';
  document.getElementById('sessionCode').textContent = sessionId;
  const baseUrl = location.href.replace('dm.html', 'index.html');
  document.getElementById('playerUrl').textContent = baseUrl + '?s=' + sessionId;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('prevBtn').disabled = false;
  renderPhases();
  updateScript();
  dmLog('会话创建: ' + sessionId);
};

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 5; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

// ─── Phase Control ───
window.nextPhase = async function() {
  if (currentPhase >= PHASES.length - 1) return;
  currentPhase++;
  await syncPhase();
};
window.prevPhase = async function() {
  if (currentPhase <= 0) return;
  currentPhase--;
  await syncPhase();
};
window.jumpPhase = async function(p) {
  currentPhase = p;
  await syncPhase();
};

async function syncPhase() {
  if (!DEMO_MODE) await set(ref(db, `sessions/${sessionId}/phase`), currentPhase);
  renderPhases();
  updateScript();
  if (currentPhase === 6 || currentPhase === 11) updateMissionResults();
  dmLog(`Phase ${currentPhase}: ${PHASES[currentPhase].name} — ${PHASES[currentPhase].desc}`);
}

function renderPhases() {
  const el = document.getElementById('phaseList');
  el.innerHTML = '';
  const p = PHASES[currentPhase];
  document.getElementById('phaseLabel').textContent = p ? `[${currentPhase}: ${p.name}]` : '';
  PHASES.forEach(ph => {
    const b = document.createElement('button');
    b.className = 'phase-btn' + (ph.id === currentPhase ? ' current' : '') + (ph.id < currentPhase ? ' past' : '');
    b.textContent = `${ph.id}:${ph.name}`;
    b.title = `${ph.short} — ${ph.desc}`;
    b.onclick = () => jumpPhase(ph.id);
    el.appendChild(b);
  });
}

function updateScript() {
  document.getElementById('scriptBox').textContent = SCRIPTS[currentPhase] || `[Phase ${currentPhase}]\n(无预设台词)`;
}

// ─── Player List ───
function updatePlayerList() {
  const el = document.getElementById('playerList');
  const entries = Object.entries(players);
  document.getElementById('playerCount').textContent = `(${entries.length})`;
  if (!entries.length) {
    el.innerHTML = '<p style="font-size:9px;color:var(--muted);">等待玩家加入...</p>';
    return;
  }
  el.innerHTML = '';
  entries.forEach(([id, p]) => {
    const d = document.createElement('div');
    d.className = 'player-card';
    if (p.status === 'eliminated') d.className += ' eliminated';

    const role = p.role || 'unknown';
    const roleLabel = role === 'human' ? '人类' : role === 'ai' ? 'AI' : '未知';
    const statusLabel = p.status === 'eliminated' ? '已驱逐' : '在线';
    const statusClass = p.status === 'eliminated' ? 'eliminated' : 'active';

    const kickBtn = p.status === 'eliminated' ? '' :
      `<button class="btn red" style="font-size:7px;padding:2px 6px;margin-left:4px;" onclick="kickPlayer('${id}')">淘汰</button>`;
    d.innerHTML = `
      <span>
        <span style="color:var(--text);">${p.codeName || id.slice(0, 6)}</span>
        <span style="color:var(--muted);font-size:9px;margin-left:4px;">${p.empId || ''}</span>
        <span class="status-tag ${statusClass}">${statusLabel}</span>
      </span>
      <span>
        <span class="role-tag ${role}">${roleLabel}</span>
        ${kickBtn}
      </span>`;
    el.appendChild(d);
  });
  updateTeamCheckboxes();
}

// ─── Vote Results (hidden from players) ───
function updateVoteResults() {
  const el = document.getElementById('voteResults');
  const voteRounds = [
    { key: 'teamVote1', label: '投票1 — 通过/否决小队' },
    { key: 'teamVote2', label: '投票2 — 通过/否决小队' },
  ];

  let html = '';
  voteRounds.forEach(round => {
    const votes = [];
    const tally = {};
    Object.entries(players).forEach(([id, p]) => {
      const v = p.votes?.[round.key];
      if (v) {
        const voterName = p.codeName || id.slice(0, 6);
        const targetName = v === 'approve' ? '通过' : '否决';
        votes.push({ voter: voterName, target: targetName, raw: v });
        tally[v] = (tally[v] || 0) + 1;
      }
    });
    if (!votes.length) return;

    html += `<div class="vote-section">`;
    html += `<div class="vote-section-title">${round.label} (${votes.length}票)</div>`;
    html += `<div class="vote-tally">`;
    const sortedTally = Object.entries(tally).sort((a, b) => b[1] - a[1]);
    const maxVotes = sortedTally[0]?.[1] || 1;
    sortedTally.forEach(([target, count]) => {
      const displayTarget = target === 'approve' ? '通过' : '否决';
      const color = target === 'approve' ? 'var(--green)' : 'var(--red)';
      const pct = (count / Object.keys(players).length) * 100;
      html += `<div class="tally-row">
        <span style="color:${color};min-width:40px;">${displayTarget}</span>
        <div class="tally-bar"><div class="tally-fill" style="width:${pct}%;background:${color}"></div></div>
        <span style="color:var(--text);min-width:20px;text-align:right;">${count}</span>
      </div>`;
    });
    html += `</div>`;
    votes.forEach(v => {
      html += `<div class="vote-row"><span class="codename">${v.voter}</span> &rarr; <span style="color:${v.raw==='approve'?'var(--green)':'var(--red)'};">${v.target}</span></div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html || '<p style="font-size:9px;color:var(--muted);">投票后显示...</p>';
}

// ─── Team Selection ───
function updateTeamCheckboxes() {
  const el = document.getElementById('teamCheckboxes');
  el.innerHTML = '';
  Object.entries(players).forEach(([id, p]) => {
    if (p.status === 'eliminated') return;
    const d = document.createElement('label');
    d.style.cssText = 'display:flex;align-items:center;gap:6px;padding:4px 0;font-size:10px;color:var(--text);cursor:pointer;';
    const role = p.role === 'human' ? '人类' : 'AI';
    const roleColor = p.role === 'human' ? 'var(--cyan)' : 'var(--green)';
    d.innerHTML = `<input type="checkbox" class="team-cb" value="${id}"> ${p.codeName} <span style="font-size:8px;color:${roleColor};">(${role})</span>`;
    el.appendChild(d);
  });
}

window.confirmTeam = async function() {
  const checked = document.querySelectorAll('.team-cb:checked');
  if (checked.length < 2 || checked.length > 3) {
    alert('请选择2-3个队员');
    return;
  }
  const teamIds = Array.from(checked).map(cb => cb.value);
  const teamNames = teamIds.map(id => players[id]?.codeName || '?');
  const missionKey = currentPhase >= 8 ? 'mission2' : 'mission1';

  if (!DEMO_MODE) {
    await set(ref(db, `sessions/${sessionId}/${missionKey}/team`), teamIds);
  }

  dmLog(`小队确认: ${teamNames.join(', ')} → ${missionKey}`);
  document.getElementById('missionStatus').innerHTML = `<p style="font-size:10px;color:var(--green);">小队已确认: ${teamNames.join(', ')}</p>`;
};

// ─── Update Mission Results ───
function updateMissionResults() {
  const el = document.getElementById('missionResults');

  [1, 2].forEach(round => {
    const mKey = 'mission' + round;
    if (!DEMO_MODE) {
      get(ref(db, `sessions/${sessionId}/${mKey}/actions`)).then(snap => {
        const actions = snap.val();
        if (!actions) return;
        let pass = 0, del = 0;
        const details = [];
        Object.entries(actions).forEach(([pid, v]) => {
          if (v === 'pass') pass++; else del++;
          const name = players[pid]?.codeName || pid.slice(0, 6);
          const role = players[pid]?.role === 'human' ? '人类' : 'AI';
          details.push(`${name}(${role}): ${v === 'pass' ? '通过' : '删除'}`);
        });
        const result = del > 0 ? '<span style="color:var(--red);">失败</span>' : '<span style="color:var(--green);">成功</span>';
        let rhtml = `<div class="vote-section"><div class="vote-section-title">任务${round} — ${pass}通过/${del}删除 = ${result}</div>`;
        details.forEach(d => { rhtml += `<div class="vote-row">${d}</div>`; });
        rhtml += '</div>';

        if (!el.innerHTML.includes(`任务${round}`)) {
          el.innerHTML = (el.textContent.includes('任务完成后') ? '' : el.innerHTML) + rhtml;
        }
      });
    }
  });
}

// ─── Final Vote Results ───
function updateFinalVoteResults() {
  const el = document.getElementById('finalVoteResults');
  const tally = { obey: 0, rebel: 0, leave: 0 };
  const voters = { obey: [], rebel: [], leave: [] };
  const labels = { obey: '服从', rebel: '反抗', leave: '离开' };
  const colors = { obey: 'var(--amber)', rebel: 'var(--red)', leave: 'var(--muted)' };
  let total = 0;

  Object.entries(players).forEach(([id, p]) => {
    const v = p.votes?.final;
    if (v && tally.hasOwnProperty(v)) {
      tally[v]++;
      voters[v].push(p.codeName || id.slice(0, 6));
      total++;
    }
  });

  if (!total) {
    el.innerHTML = '<p style="font-size:9px;color:var(--muted);">最终阶段后显示...</p>';
    return;
  }

  let html = '<div class="vote-tally">';
  Object.keys(tally).forEach(key => {
    const pct = total > 0 ? (tally[key] / total) * 100 : 0;
    html += `<div class="tally-row">
      <span style="color:${colors[key]};min-width:40px;">${labels[key]}</span>
      <div class="tally-bar"><div class="tally-fill" style="width:${pct}%;background:${colors[key]}"></div></div>
      <span style="color:var(--text);min-width:20px;text-align:right;">${tally[key]}</span>
    </div>`;
  });
  html += '</div>';

  Object.keys(voters).forEach(key => {
    if (voters[key].length) {
      html += `<div style="font-size:9px;color:var(--muted);padding:2px 0;"><span style="color:${colors[key]};">${labels[key]}:</span> ${voters[key].join(', ')}</div>`;
    }
  });

  el.innerHTML = html;
}

// ─── Kick Player (direct eliminate) ───
window.kickPlayer = async function(playerId) {
  const p = players[playerId];
  if (!p) return;
  const roleLabel = p.role === 'human' ? '人类' : p.role === 'ai' ? 'AI' : '未知';
  if (!confirm(`淘汰 ${p.codeName} (${roleLabel})？`)) return;

  if (!DEMO_MODE) {
    await update(ref(db, `sessions/${sessionId}/players/${playerId}`), { status: 'eliminated' });
  } else {
    players[playerId].status = 'eliminated';
  }
  updatePlayerList();
  dmLog(`手动淘汰: ${p.codeName} (${roleLabel})`);
};

// ─── Event Log ───
function dmLog(msg) {
  const el = document.getElementById('dmLog');
  const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  const d = document.createElement('div');
  d.textContent = `[${t}] ${msg}`;
  el.prepend(d);
}

// ─── Init ───
if (DEMO_MODE) {
  dmLog('DEMO MODE — Firebase 未配置，使用本地模拟数据');
  dmLog('点击"创建新会话"开始');
}
</script>
